# Type CTRL + I to install plugings


##########################
#        Bindings        #
##########################

unbind r 
bind r source-file ~/.tmux.conf

# Split panes using | and -
bind | split-window -h 
bind - split-window -v
unbind '"'
unbind %

# Switch panes using Alt-arrow without prefix
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U 
bind -n M-Down select-pane -D

# Binding home and end key
bind-key -n Home send Escape "OH"
bind-key -n End send Escape "OF"   

# Use xclip to copy and paste with the system clipboard
bind C-c run "tmux save-buffer - | xclip -i -sel clip"
bind C-v run "tmux set-buffer $(xclip -o -sel clip); tmux paste-buffer"

# Switch between windows with Alt + number
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

##########################
#      General Conf      #
##########################

# Start shell with padding between the status bar and the shell prompt
#set-hook -g pane-focus-in 'run-shell "tty >/dev/null 2>&1 && printf \"\n\" > $(tty)"'

# Remap prefix, refresh the resource file with CTRL + r
set -g prefix C-a 

# Enable mouse control (clickable windows, panes, resizables panes)
set -g mouse on

# Don't rename windows automatically
set-option -g allow-rename off

# Start counting pane and windows number at 1
set -g base-index 1
setw -g pane-base-index 1

# Status bar customization
set -g status-position bottom 

# Set bg transparent
set-option -g status-style bg=default

##########################
#   TPM Plugin Manager   #
##########################

# List of plugins
set -g @plugin 'tmux-plugins/tpm'

# Status bar theme 
# set -g @plugin 'leighmcculloch/tmux-colours-superhero'
# set -g @plugin 'TanglingTreats/tmux-everforest' # Adds to the list of plugins
# set -g @tmux-everforest 'dark-medium' # Sets the option to select the theme. Also the default.

set -g @plugin 'rose-pine/tmux'
set -g @rose_pine_variant 'main' # Options are 'main', 'moon' or 'dawn'


set -g @rose_pine_host 'on' # Enables hostname in the status bar
set -g @rose_pine_hostname_short 'on' # Makes the hostname shorter by using tmux's '#h' format
set -g @rose_pine_date_time '' # It accepts the date UNIX command format (man date for info)
set -g @rose_pine_user 'on' # Turn on the username component in the statusbar
set -g @rose_pine_directory 'on' # Turn on the current folder component in the status bar

set -g @rose_pine_bar_bg_disable 'on' # Disables background color, for transparent terminal emulators
# If @rose_pine_bar_bg_disable is set to 'on', uses the provided value to set the background color
# It can be any of the on tmux (named colors, 256-color set, `default` or hex colors)
# See more on http://man.openbsd.org/OpenBSD-current/man1/tmux.1#STYLES
set -g @rose_pine_bar_bg_disabled_color_option 'default'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
